<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PR Agent Reviewer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand-block">
          <h1>PR Agent Reviewer</h1>
          <p id="statusText">Ready</p>
        </div>
        <div class="provider-strip" id="providerStrip"></div>
      </header>

      <section class="workspace" aria-label="Review workspace">
        <form class="control-panel" id="reviewForm">
          <div class="panel-title">
            <span>Review a PR</span>
            <span class="mode-pill">Simple Mode</span>
          </div>

          <label>
            PR link or repo
            <input
              id="prRef"
              name="prRef"
              autocomplete="off"
              placeholder="github.com/org/repo/pull/123 or org/repo"
              required
            />
          </label>

          <label>
            Use
            <select id="providerName" name="providerName" required></select>
          </label>

          <details class="advanced">
            <summary>Advanced</summary>
            <label>
              Workspace
              <input id="workspace" name="workspace" autocomplete="off" required />
            </label>
            <button id="readGitButton" type="button">Detect local PR</button>
            <div class="git-panel" id="gitPanel">
              <p>Local git not checked.</p>
            </div>
            <label>
              GitHub token
              <input
                id="githubToken"
                name="githubToken"
                type="password"
                autocomplete="off"
                placeholder="optional"
              />
            </label>
            <div class="token-actions">
              <button id="saveGithubTokenButton" type="button">Save token</button>
              <button id="clearGithubTokenButton" type="button">Forget</button>
            </div>
            <div class="token-status" id="githubTokenStatus">Token not checked</div>
          </details>

          <div class="repo-picker">
            <label>
              Browse repo PRs
              <input
                id="repoRef"
                name="repoRef"
                autocomplete="off"
                placeholder="org/repo"
              />
            </label>
            <button id="loadRepoButton" type="button">Show PRs</button>
          </div>

          <div class="repo-meta" id="repoMeta">Paste a PR link or browse a repo.</div>
          <div class="repo-pr-list" id="repoPrList"></div>

          <div class="actions">
            <button class="primary" id="runButton" type="submit">Run review</button>
          </div>
        </form>

        <section class="review-surface" aria-live="polite">
          <div class="summary-row">
            <div>
              <span class="meta-label">PR</span>
              <strong id="prTitle">No review loaded</strong>
            </div>
            <div class="counts" id="counts"></div>
          </div>

          <label class="summary-editor">
            Summary
            <textarea id="summary" rows="4" disabled></textarea>
          </label>

          <div class="result-actions">
            <button id="copyPromptButton" type="button" disabled>Copy fix prompt</button>
            <button id="postButton" type="button" disabled>Post comments</button>
          </div>

          <div class="tabs">
            <button class="tab active" type="button" data-tab="comments">Comments</button>
            <button class="tab" type="button" data-tab="prompt">Fix Prompt</button>
          </div>

          <div class="tab-panel active" id="commentsPanel"></div>
          <pre class="tab-panel raw-output" id="promptPanel"></pre>
        </section>
      </section>
    </main>

    <template id="findingTemplate">
      <article class="finding">
        <div class="finding-head">
          <label class="checkline">
            <input class="finding-selected" type="checkbox" checked />
            <span class="finding-location"></span>
          </label>
          <select class="finding-severity">
            <option value="bug">bug</option>
            <option value="security">security</option>
            <option value="performance">performance</option>
            <option value="maintainability">maintainability</option>
            <option value="test">test</option>
            <option value="question">question</option>
          </select>
        </div>
        <textarea class="finding-comment" rows="4"></textarea>
        <textarea class="finding-suggestion" rows="3" placeholder="Suggested direction"></textarea>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
